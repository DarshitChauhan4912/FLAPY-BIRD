<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON FLAPPY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050508; --accent: #00f2ff; --p1: #f1c40f; --event: #ff007a; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); font-family: 'Share Tech Mono', monospace; color: #fff; overflow: hidden; }

        /* VISUAL FX */
        #bg-canvas { position: absolute; inset: 0; z-index: 1; }
        .scanlines { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.07) 51%); background-size: 100% 4px; pointer-events: none; z-index: 100; }
        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }

        /* UI SCREENS */
        .screen { position: absolute; inset: 0; display: none; z-index: 10; padding: 30px; }
        .active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease; }
        .hud-panel { background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.15); border-radius: 4px; padding: 15px; backdrop-filter: blur(12px); }
        
        /* HOME GRID */
        .home-grid { display: grid; grid-template-columns: 280px 1fr 280px; grid-template-rows: 1fr 100px; height: 100%; gap: 20px; z-index: 20; position: relative; }
        .hero { grid-column: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .game-title { font-family: 'Orbitron'; font-size: clamp(40px, 8vw, 85px); text-align: center; line-height: 0.9; text-shadow: 0 0 20px var(--accent); margin: 0; }
        .bird-preview { width: 75px; height: 55px; margin: 30px; animation: float 3s ease-in-out infinite; border-radius: 4px; box-shadow: 0 0 30px var(--accent); }

        /* BUTTONS */
        .btn-main { padding: 22px 60px; font-family: 'Orbitron'; background: #fff; color: #000; border: none; font-weight: 900; cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); transition: 0.3s; font-size: 1.3rem; }
        .btn-main:hover { background: var(--accent); transform: scale(1.08); box-shadow: 0 0 40px var(--accent); }
        .btn-sub { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 12px 25px; cursor: pointer; margin: 10px; transition: 0.2s; }
        .btn-sub:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

        /* SCROLLABLE MODALS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .modal.open { display: flex; }
        .scroll-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; width: 100%; max-width: 900px; max-height: 65vh; overflow-y: auto; padding: 15px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02);
        }
        .scroll-grid::-webkit-scrollbar { width: 6px; }
        .scroll-grid::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 4px; cursor: pointer; text-align: center; transition: 0.2s; text-transform: uppercase; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); background: rgba(0,242,255,0.05); }
        .card.selected { border-color: var(--accent); box-shadow: inset 0 0 10px rgba(0,242,255,0.2); background: rgba(0,242,255,0.1); }

        #game-hud { position: absolute; top: 20px; left: 20px; right: 20px; display: none; justify-content: space-between; z-index: 50; }
        #stage { position: absolute; inset: 0; z-index: 5; display: none; cursor: crosshair; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body id="main-body">

    <canvas id="bg-canvas"></canvas>
    <div class="scanlines"></div>

    <div id="home-screen" class="screen active">
        <div class="home-grid">
            <div class="hud-panel">
                <div style="color:var(--accent); font-size:12px; border-bottom:1px solid; margin-bottom:10px">SYSTEM_LOG</div>
                <div id="log-content" style="font-size:11px; color:#aaa; line-height:1.7">
                    > HUB: ONLINE<br>
                    > SECTOR: <span id="cur-map-txt" style="color:var(--accent)">NEON</span><br>
                    > SHIP: <span id="cur-skin-txt">CYBER</span><br>
                    > RADAR: NO THREATS<br><br>
                    <span style="color:#444">> WAITING FOR PILOT...</span>
                </div>
            </div>

            <div class="hero">
                <h1 class="game-title">NEON<br>FLAPPY</h1>
                <div id="bird-hero" class="bird-preview"></div>
                <button class="btn-main" onclick="openModal('map-modal')">LAUNCH MISSION</button>
                <div style="margin-top: 10px;">
                    <button class="btn-sub" onclick="openModal('shop-modal')">SKIN BAY</button>
                </div>
            </div>

            <div class="hud-panel">
                <div style="color:var(--accent); font-size:12px; border-bottom:1px solid; margin-bottom:10px">PILOT_STATS</div>
                <div style="font-size:12px">
                    CREDITS: <span id="stat-coins" style="color:var(--p1)">0</span><br>
                    RECORD: <span id="stat-high" style="color:#fff">0</span><br><br>
                    RANK: <span id="pilot-rank" style="color:var(--accent)">ROOKIE</span>
                </div>
            </div>
        </div>
    </div>

    <div id="map-modal" class="modal">
        <h2 style="font-family: Orbitron; color: var(--accent);">SECTOR SELECTION</h2>
        <div class="scroll-grid" id="map-list"></div>
        <button class="btn-sub" onclick="closeModals()">RETURN</button>
    </div>

    <div id="shop-modal" class="modal">
        <h2 style="font-family: Orbitron;">SKIN INVENTORY</h2>
        <div class="hud-panel" style="margin-bottom:15px">CREDITS: 🪙 <span id="shop-coins">0</span></div>
        <div class="scroll-grid" id="shop-list"></div>
        <button class="btn-sub" onclick="closeModals()">RETURN</button>
    </div>

    <div id="game-hud">
        <div class="hud-panel">SCORE: <span id="live-score">0</span></div>
        <div class="hud-panel" style="color:var(--p1)">🪙 <span id="live-coins">0</span></div>
    </div>
    <canvas id="stage"></canvas>

<script>
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx = bgCanvas.getContext('2d');

    // AUDIO SYSTEM (Procedural Web Audio)
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function playSound(type) {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;
        if (type === 'jump') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'score') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.setValueAtTime(600, now + 0.05);
            gain.gain.setValueAtTime(0.05, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'crash') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        }
    }

    // EXPANDED DATA
    const maps = [
        { id: 'neon', name: 'NEON CITY', bg: '#050508', pipe: '#00f2ff', grav: 0.24, speed: 5, gap: 180 },
        { id: 'void', name: 'THE VOID', bg: '#0a0510', pipe: '#a29bfe', grav: 0.16, speed: 7.5, gap: 200 },
        { id: 'mars', name: 'MARS BASE', bg: '#1a0a05', pipe: '#e67e22', grav: 0.20, speed: 6, gap: 185 },
        { id: 'abyss', name: 'ABYSS', bg: '#05101a', pipe: '#3498db', grav: 0.35, speed: 4.5, gap: 210 },
        { id: 'toxic', name: 'TOXIC ZONE', bg: '#0a1a05', pipe: '#2ecc71', grav: 0.28, speed: 6.5, gap: 170 },
        { id: 'nova', name: 'SUPERNOVA', bg: '#1a0505', pipe: '#ff4757', grav: 0.22, speed: 8.5, gap: 190 },
        { id: 'nebula', name: 'NEBULA P-9', bg: '#0a001a', pipe: '#d281ff', grav: 0.12, speed: 10, gap: 220 },
        { id: 'glitch', name: 'GLITCH CORE', bg: '#000', pipe: '#fff', grav: 0.30, speed: 12, gap: 150 }
    ];

    const skins = [
        { id: 'cyber', color: '#00f2ff', price: 0 },
        { id: 'ruby', color: '#ff4757', price: 200 },
        { id: 'gold', color: '#f1c40f', price: 500 },
        { id: 'emerald', color: '#2ecc71', price: 800 },
        { id: 'ghost', color: '#ffffff', price: 1500 },
        { id: 'obsidian', color: '#333333', price: 2500 },
        { id: 'plasma', color: '#ff007a', price: 5000 },
        { id: 'matrix', color: '#00ff41', price: 10000 }
    ];

    let state = {
        coins: parseInt(localStorage.getItem('nfb_coins')) || 0,
        high: parseInt(localStorage.getItem('nfb_high')) || 0,
        lastScore: parseInt(localStorage.getItem('nfb_lastScore')) || 0,
        owned: JSON.parse(localStorage.getItem('nfb_owned')) || ['cyber'],
        skin: localStorage.getItem('nfb_skin') || 'cyber',
        map: 'neon',
        playing: false
    };

    // UI RENDERERS
    function updateHub() {
        document.getElementById('stat-coins').innerText = state.coins;
        document.getElementById('shop-coins').innerText = state.coins;
        document.getElementById('stat-high').innerText = state.high;
        const s = skins.find(sk => sk.id === state.skin);
        document.getElementById('bird-hero').style.background = s.color;
        document.getElementById('cur-map-txt').innerText = maps.find(m=>m.id===state.map).name;
        document.getElementById('cur-skin-txt').innerText = state.skin.toUpperCase();
        document.getElementById('pilot-rank').innerText = state.high > 50 ? "ACE" : "ROOKIE";
    }

    function openModal(id) {
        if(id === 'map-modal') renderMaps();
        if(id === 'shop-modal') renderSkins();
        document.getElementById(id).classList.add('open');
    }
    function closeModals() { document.querySelectorAll('.modal').forEach(m=>m.classList.remove('open')); }

    function renderMaps() {
        const c = document.getElementById('map-list'); c.innerHTML = '';
        maps.forEach(m => {
            const d = document.createElement('div');
            d.className = `card ${state.map === m.id ? 'selected' : ''}`;
            d.innerHTML = `<div style="height:35px;background:${m.bg};border:1px solid ${m.pipe};margin-bottom:8px"></div>${m.name}`;
            d.onclick = () => { 
                state.map = m.id; 
                updateHub(); 
                updateBGForMap(m.id);
                closeModals(); 
                launch(); 
            };
            c.appendChild(d);
        });
    }

    function renderSkins() {
        const c = document.getElementById('shop-list'); c.innerHTML = '';
        skins.forEach(s => {
            const own = state.owned.includes(s.id);
            const d = document.createElement('div');
            d.className = `card ${state.skin === s.id ? 'selected' : ''}`;
            d.innerHTML = `<div style="height:35px;background:${s.color};margin-bottom:8px;box-shadow:0 0 10px ${s.color}"></div>${own ? 'EQUIP' : '🪙'+s.price}`;
            d.onclick = () => {
                if(own) state.skin = s.id;
                else if(state.coins >= s.price) { state.coins -= s.price; state.owned.push(s.id); state.skin = s.id; }
                localStorage.setItem('nfb_owned', JSON.stringify(state.owned));
                localStorage.setItem('nfb_skin', state.skin);
                localStorage.setItem('nfb_coins', state.coins);
                updateHub(); renderSkins();
            };
            c.appendChild(d);
        });
    }

    // GAME ENGINE
    let w, h, bird, pipes, score, sessionCoins, frame, trails, particles;

    function launch() {
        state.playing = true;
        document.getElementById('home-screen').classList.remove('active');
        document.getElementById('stage').style.display = 'block';
        document.getElementById('game-hud').style.display = 'flex';
        
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w; canvas.height = h;

        const s = skins.find(sk => sk.id === state.skin);
        bird = { x: w*0.2, y: h/2, v: 0, w: 32, h: 24, color: s.color };
        pipes = []; trails = []; particles = []; score = 0; sessionCoins = 0; frame = 0;
        
        document.getElementById('live-score').innerText = state.lastScore; // Shows previous score at start
        document.getElementById('live-coins').innerText = sessionCoins;
        
        updateBGForMap(state.map);
        loop();
    }

    function loop() {
        if(!state.playing) return;
        frame++;
        const m = maps.find(map => map.id === state.map);
        
        // Transparent clear allows the background planet canvas to render seamlessly behind the gameplay
        ctx.clearRect(0, 0, w, h);

        // Neon Trails
        if(frame % 2 === 0) trails.push({x: bird.x, y: bird.y, a: 0.5});
        trails.forEach((t, i) => {
            t.x -= m.speed; t.a -= 0.02;
            ctx.fillStyle = bird.color; ctx.globalAlpha = t.a;
            ctx.fillRect(t.x, t.y+4, 24, 16);
            if(t.a <= 0) trails.splice(i, 1);
        });
        ctx.globalAlpha = 1;

        // Particle FX
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.a -= 0.03;
            ctx.fillStyle = bird.color; ctx.globalAlpha = Math.max(0, p.a);
            ctx.fillRect(p.x, p.y, p.s, p.s);
            if(p.a <= 0) particles.splice(i, 1);
        });
        ctx.globalAlpha = 1;

        // Physics
        bird.v += m.grav; bird.y += bird.v;
        ctx.fillStyle = bird.color; ctx.shadowBlur = 15; ctx.shadowColor = bird.color;
        ctx.fillRect(bird.x, bird.y, bird.w, bird.h);
        ctx.shadowBlur = 0;

        // Obstacles
        if(frame % 90 === 0) pipes.push({ x: w, t: Math.random()*(h-350)+50, scored: false });
        pipes.forEach((p, i) => {
            p.x -= m.speed;
            ctx.fillStyle = m.pipe;
            ctx.fillRect(p.x, 0, 70, p.t);
            ctx.fillRect(p.x, p.t + m.gap, 70, h);

            if(bird.x + bird.w > p.x && bird.x < p.x + 70) {
                if(bird.y < p.t || bird.y + bird.h > p.t + m.gap) crash();
            }
            if(!p.scored && p.x < bird.x) { 
                p.scored = true; 
                score++; 
                sessionCoins += 2; 
                playSound('score');
            }
        });

        // Score display logic
        if (score > 0) {
            document.getElementById('live-score').innerText = score;
        } else {
            document.getElementById('live-score').innerText = state.lastScore;
        }

        document.getElementById('live-coins').innerText = sessionCoins;
        if(bird.y > h || bird.y < 0) crash();
        requestAnimationFrame(loop);
    }

    function spawnParticles(x, y) {
        for(let i=0; i<15; i++) {
            particles.push({ x: x, y: y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, s: Math.random()*5+2, a: 1 });
        }
    }

    function crash() {
        state.playing = false;
        playSound('crash');
        spawnParticles(bird.x + bird.w/2, bird.y + bird.h/2);
        
        document.getElementById('main-body').classList.add('shake');
        state.coins += sessionCoins;
        state.lastScore = score;
        if(score > state.high) state.high = score;
        
        localStorage.setItem('nfb_coins', state.coins);
        localStorage.setItem('nfb_high', state.high);
        localStorage.setItem('nfb_lastScore', state.lastScore);
        
        setTimeout(() => {
            document.getElementById('main-body').classList.remove('shake');
            document.getElementById('stage').style.display = 'none';
            document.getElementById('game-hud').style.display = 'none';
            document.getElementById('home-screen').classList.add('active');
            updateHub();
            updateBGForMap(state.map);
        }, 1200);
    }

    // CONTROLS 
    function jump() { 
        if(state.playing) { 
            bird.v = -5.8; 
            playSound('jump');
            spawnParticles(bird.x, bird.y + bird.h);
        } 
    }
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') { e.preventDefault(); jump(); } });
    window.addEventListener('mousedown', (e) => { 
        if(e.button === 2) { e.preventDefault(); jump(); } // Right click logic
    });
    window.oncontextmenu = (e) => { e.preventDefault(); return false; }; // Disable browser context menu

    // BG STARS & PLANETS
    let bgStars = [];
    let bgPlanets = [];
    let gridOffset = 0;

    function initBG() {
        bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
        bgStars = [];
        for(let i=0; i<90; i++) {
            bgStars.push({x: Math.random()*bgCanvas.width, y: Math.random()*bgCanvas.height, s: Math.random()*2});
        }
        updateBGForMap(state.map);
        drawBG();
    }

    function updateBGForMap(mapId) {
        bgPlanets = [];
        const wVal = bgCanvas.width || window.innerWidth;
        const hVal = bgCanvas.height || window.innerHeight;
        const m = maps.find(x => x.id === mapId);
        
        let count = 4;
        if (mapId === 'glitch') count = 12;
        if (mapId === 'nebula' || mapId === 'void') count = 5;
        
        for(let i=0; i<count; i++) {
            let color, ringColor, isSquare = false, hasRing = Math.random() > 0.4;
            let radius = 25 + Math.random()*55;
            
            switch(mapId) {
                case 'neon':
                    color = i % 2 === 0 ? '#ff007a' : '#00f2ff';
                    ringColor = i % 2 === 0 ? '#00f2ff' : '#ff007a';
                    break;
                case 'void':
                    color = `hsl(${260 + Math.random()*30}, 65%, 22%)`;
                    ringColor = 'rgba(162, 155, 254, 0.4)';
                    hasRing = true;
                    radius = 45 + Math.random()*55;
                    break;
                case 'mars':
                    color = `hsl(${12 + Math.random()*15}, 80%, 42%)`;
                    hasRing = false;
                    break;
                case 'abyss':
                    color = `hsl(${195 + Math.random()*20}, 70%, 28%)`;
                    ringColor = 'rgba(52, 152, 219, 0.3)';
                    break;
                case 'toxic':
                    color = `hsl(${95 + Math.random()*25}, 85%, 38%)`;
                    ringColor = 'rgba(46, 204, 113, 0.4)';
                    break;
                case 'nova':
                    color = `hsl(${5 + Math.random()*20}, 95%, 55%)`;
                    ringColor = 'rgba(241, 196, 15, 0.5)';
                    radius = 20 + Math.random()*35;
                    break;
                case 'nebula':
                    color = `hsl(${280 + Math.random()*35}, 75%, 45%)`;
                    ringColor = 'rgba(210, 129, 255, 0.4)';
                    radius = 55 + Math.random()*65;
                    hasRing = true;
                    break;
                case 'glitch':
                    color = Math.random() > 0.5 ? '#ffffff' : '#333333';
                    isSquare = true;
                    hasRing = false;
                    radius = 12 + Math.random()*40;
                    break;
                default:
                    color = '#00f2ff';
                    ringColor = '#ff007a';
            }
            
            bgPlanets.push({
                x: Math.random() * wVal,
                y: Math.random() * hVal,
                r: radius,
                s: (0.15 + Math.random() * 0.35) * (m ? Math.max(0.6, m.speed / 5) : 1),
                c: color,
                ringColor: ringColor,
                ring: hasRing,
                isSquare: isSquare
            });
        }
    }

    function drawHomepageGrid(m) {
        const color = m ? m.pipe : '#00f2ff';
        const wVal = bgCanvas.width;
        const hVal = bgCanvas.height;
        
        bgCtx.save();
        
        // Subtle full screen technical grid overlay
        const size = 60;
        gridOffset = (gridOffset + (m ? m.speed * 0.08 : 0.4)) % size;
        bgCtx.strokeStyle = color + '05'; 
        bgCtx.lineWidth = 1;
        for(let x = gridOffset; x < wVal; x += size) {
            bgCtx.beginPath(); bgCtx.moveTo(x, 0); bgCtx.lineTo(x, hVal); bgCtx.stroke();
        }
        for(let y = gridOffset; y < hVal; y += size) {
            bgCtx.beginPath(); bgCtx.moveTo(0, y); bgCtx.lineTo(wVal, y); bgCtx.stroke();
        }

        // Animated Retro Cyber Ground Grid Layout
        const horizon = hVal * 0.6;
        const groundHeight = hVal - horizon;
        
        bgCtx.beginPath();
        bgCtx.moveTo(0, horizon);
        bgCtx.lineTo(wVal, horizon);
        bgCtx.strokeStyle = color + '33';
        bgCtx.lineWidth = 2;
        bgCtx.stroke();
        
        let glow = bgCtx.createLinearGradient(0, horizon - 60, 0, hVal);
        glow.addColorStop(0, 'transparent');
        glow.addColorStop(0.45, color + '12'); 
        glow.addColorStop(0.5, color + '25'); 
        glow.addColorStop(0.55, color + '12');
        glow.addColorStop(1, 'transparent');
        bgCtx.fillStyle = glow;
        bgCtx.fillRect(0, horizon - 60, wVal, groundHeight + 60);

        // Perspective grid ray line paths
        bgCtx.strokeStyle = color + '1A'; 
        bgCtx.lineWidth = 1.5;
        const vanishingX = wVal / 2;
        const lines = 25;
        for (let i = -lines; i <= lines; i++) {
            bgCtx.beginPath();
            bgCtx.moveTo(vanishingX, horizon);
            bgCtx.lineTo(vanishingX + (i * (wVal / 12)), hVal);
            bgCtx.stroke();
        }

        // Horizon-compressing movement lines
        let speedMult = m ? m.speed * 0.12 : 0.5;
        let pOffset = (gridOffset * speedMult) % 40;
        bgCtx.strokeStyle = color + '1A';
        for (let i = 0; i < 10; i++) {
            let ratio = (i + pOffset / 40) / 10;
            if (ratio > 1) continue;
            let y = horizon + Math.pow(ratio, 2) * groundHeight;
            bgCtx.beginPath();
            bgCtx.moveTo(0, y);
            bgCtx.lineTo(wVal, y);
            bgCtx.stroke();
        }

        bgCtx.restore();
    }

    function drawBG() {
        const mapId = state.map;
        const m = maps.find(map => map.id === mapId);
        
        bgCtx.fillStyle = m ? m.bg : '#050508'; 
        bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
        
        if (!state.playing) {
            drawHomepageGrid(m);
        }
        
        // Draw Stars
        bgCtx.fillStyle = '#fff';
        bgStars.forEach(s => {
            s.x -= s.s * (m ? m.speed * 0.04 : 0.2);
            if(s.x < 0) s.x = bgCanvas.width;
            bgCtx.fillRect(s.x, s.y, s.s, s.s);
        });

        // Draw Planets
        bgPlanets.forEach(p => {
            p.x -= p.s;
            if (p.x < -p.r * 2) { 
                p.x = bgCanvas.width + p.r * 2; 
                p.y = Math.random() * bgCanvas.height; 
            }
            
            if (p.isSquare) {
                bgCtx.save();
                bgCtx.fillStyle = p.c;
                if (Math.random() > 0.97) bgCtx.fillStyle = '#fff'; // Glitch flash effect
                bgCtx.fillRect(p.x - p.r, p.y - p.r, p.r * 2, p.r * 2);
                bgCtx.strokeStyle = 'rgba(255,255,255,0.15)';
                bgCtx.strokeRect(p.x - p.r, p.y - p.r, p.r * 2, p.r * 2);
                bgCtx.restore();
            } else {
                bgCtx.save();
                if (mapId === 'neon' || mapId === 'nova' || mapId === 'toxic') {
                    bgCtx.shadowBlur = 25;
                    bgCtx.shadowColor = p.c;
                }
                bgCtx.beginPath();
                bgCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                bgCtx.fillStyle = p.c;
                bgCtx.fill();
                bgCtx.restore();
                
                // Sphere shading overlay
                bgCtx.beginPath();
                bgCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                let gradient = bgCtx.createRadialGradient(p.x - p.r*0.3, p.y - p.r*0.3, p.r*0.1, p.x, p.y, p.r);
                gradient.addColorStop(0, 'rgba(255,255,255,0.15)');
                gradient.addColorStop(0.5, 'rgba(0,0,0,0)');
                gradient.addColorStop(1, 'rgba(0,0,0,0.65)');
                bgCtx.fillStyle = gradient;
                bgCtx.fill();

                // Planet Ring
                if (p.ring) {
                    bgCtx.beginPath();
                    bgCtx.ellipse(p.x, p.y, p.r * 1.5, p.r * 0.28, Math.PI / 6, 0, Math.PI*2);
                    bgCtx.strokeStyle = p.ringColor || 'rgba(255,255,255,0.2)';
                    bgCtx.lineWidth = Math.max(1.5, p.r * 0.06);
                    bgCtx.stroke();
                }
            }
        });
        
        requestAnimationFrame(drawBG);
    }

    window.onload = () => { initBG(); updateHub(); };
    window.onresize = () => { 
        bgCanvas.width = window.innerWidth; 
        bgCanvas.height = window.innerHeight; 
        updateBGForMap(state.map);
    };
</script>
</body>
